services:
  # ------------------------------
  # PostgreSQL
  # ------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: algo_postgres
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user} -d ${POSTGRES_DB:-trading_platform}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------
  # Redis
  # ------------------------------
  redis:
    image: redis:7-alpine
    container_name: algo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------
  # Alembic migrations
  # ------------------------------
  migrate:
    build: ./backend
    container_name: app_migrate
    command: alembic upgrade head
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------
  # FastAPI app
  # ------------------------------
  fastapi:
    build: ./backend
    container_name: app_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --loop asyncio
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
      - cache_data:/app/data/cache
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ------------------------------
  # Celery worker
  # ------------------------------
  celery_worker:
    build: ./backend
    container_name: app_worker
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
      - cache_data:/app/data/cache
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ------------------------------
  # Celery beat scheduler
  # ------------------------------
  celery_beat:
    build: ./backend
    container_name: app_beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ------------------------------
  # Next.js frontend
  # ------------------------------
  # Dockerfile builds a production image (multi-stage, standalone output).
  # For local dev with hot-reload, override with:
  #   command: npm run dev
  #   volumes: ["./frontend:/app", "/app/node_modules"]
  nextjs:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    container_name: app_frontend
    ports:
      - "3000:3000"
    depends_on:
      - fastapi

  # ------------------------------
  # Celery Flower (task monitoring)
  # ------------------------------
  flower:
    build: ./backend
    container_name: app_flower
    command: celery -A app.celery_app flower --port=5555 --broker_api=redis://redis:6379/0
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # ------------------------------
  # Prometheus (metrics collection)
  # ------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: app_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - fastapi

  # ------------------------------
  # Grafana (dashboards)
  # ------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: app_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-oraculum}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

# ------------------------------
# Volumes
# ------------------------------
volumes:
  postgres_data:
  redis_data:
  cache_data:
  prometheus_data:
  grafana_data:
