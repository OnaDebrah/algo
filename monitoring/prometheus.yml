global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # FastAPI application metrics
  - job_name: "oraculum-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi:8000"]
        labels:
          service: "api"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
