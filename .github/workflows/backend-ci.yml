name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff

    - name: Check code formatting
      run: |
        ruff format --check .

    - name: Run linter
      run: |
        ruff check .

    - name: Audit dependencies
      run: |
        pip install pip-audit
        pip-audit --strict --desc \
          --ignore-vuln CVE-2024-23342 \
          --ignore-vuln GHSA-rf74-v2fm-23pw \
          --ignore-vuln CVE-2026-33230 \
          --ignore-vuln CVE-2026-33231 \
          --ignore-vuln CVE-2026-0994 \
          --ignore-vuln CVE-2026-30922 \
          --ignore-vuln PYSEC-2024-259
      # Ignored CVEs with no available fix:
      # CVE-2024-23342: ecdsa Minerva timing (project won't fix, side-channel out of scope)
      # GHSA-rf74-v2fm-23pw: nltk JSONTaggedDecoder recursion (no fix released)
      # CVE-2026-33230: nltk WordNet XSS (not used in production, local tool only)
      # CVE-2026-33231: nltk WordNet shutdown (not used in production, local tool only)
      # CVE-2026-0994: protobuf recursion DoS (transitive dep, 5.x incompatible with tensorflow)
      # CVE-2026-30922: pyasn1 recursion DoS (transitive dep, no fix for 0.4.x)
      # PYSEC-2024-259: torch disputed deserialization (intended behavior per PyTorch)

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trading_platform
          POSTGRES_USER: trading_user
          POSTGRES_PASSWORD: secure_password_here
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://trading_user:password@localhost:5432/trading_platform
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: trading_platform
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: password
      JWT_SECRET_KEY: test_jwt_secret_key_12345678901234567890
      SECRET_KEY: test_secret_key_12345678901234567890
      SENTRY_DSN: ""

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f backend/Dockerfile backend/ --tag backend-ci:${{ github.sha }}
