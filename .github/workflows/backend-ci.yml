name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff

    - name: Check code formatting
      run: |
        # Fail the build if any files are incorrectly formatted
        ruff format --check .

    - name: Run linter
      run: |
        # Run ruff linter to catch syntax errors and undefined names
        ruff check .

    # Note: Testing with pytest is intentionally omitted until the database
    # test fixtures are properly isolated from the production environment.
