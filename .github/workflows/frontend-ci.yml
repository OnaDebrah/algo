name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=high || true
      # `|| true` prevents failure on moderate/low advisories;
      # only high/critical severity will be flagged in the output

    - name: Run Linter
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f frontend/Dockerfile frontend/ --tag frontend-ci:${{ github.sha }}
